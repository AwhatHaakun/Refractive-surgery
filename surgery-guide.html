<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>近视手术全术式科普</title>
<style>
  :root {
    --bg-white: #ffffff;
    --bg-light: #f5f5f7;
    --bg-dark: #000000;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #86868b;
    --text-inverse: #f5f5f7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --border: rgba(0,0,0,0.08);
    --nav-height: 48px;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 22px;
    --radius-pill: 980px;
    --shadow-soft: 0 4px 16px rgba(0,0,0,0.04);
    --shadow-card: 0 8px 32px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg-white);
    color: var(--text-primary);
    line-height: 1.47;
    letter-spacing: -0.022em;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Tab Bar (Procedure Selector) - Apple Style ===== */
  .tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
    background: rgba(255,255,255,0.72);
    backdrop-filter: saturate(180%) blur(30px);
    -webkit-backdrop-filter: saturate(180%) blur(30px);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    box-shadow: 0 1px 0 0 rgba(0,0,0,0.03);
  }
  .tab-bar-inner {
    display: flex; justify-content: center; align-items: center;
    max-width: 980px; margin: 0 auto; padding: 0 22px;
  }
  .tab-item { position: relative; display: flex; align-items: center; }
  .tab-btn {
    padding: 14px 24px; font-size: 17px; font-weight: 600;
    color: var(--text-primary); border: none; background: none;
    cursor: pointer; border-bottom: 3px solid transparent;
    transition: all 0.4s cubic-bezier(0.28, 0.11, 0.32, 1);
    white-space: nowrap; letter-spacing: -0.3px;
  }
  .tab-btn:hover { color: var(--accent); transform: translateY(-1px); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn.coming-soon { color: rgba(0,0,0,0.4); }
  .tab-btn.coming-soon::after {
    content: ' 即将'; font-size: 11px; font-weight: 500;
    color: rgba(0,0,0,0.3); margin-left: 4px;
  }

  /* Dropdown */
  .dropdown-menu {
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(255,255,255,0.82);
    backdrop-filter: saturate(200%) blur(40px);
    -webkit-backdrop-filter: saturate(200%) blur(40px);
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    border: 0.5px solid rgba(0,0,0,0.06);
    padding: 16px 20px; opacity: 0; visibility: hidden;
    transition: all 0.35s cubic-bezier(0.28, 0.11, 0.32, 1);
    pointer-events: none; z-index: 2000;
    display: flex; gap: 8px; flex-wrap: nowrap;
  }
  .tab-item.has-dropdown:hover .dropdown-menu,
  .tab-item.has-dropdown .tab-btn:focus+.dropdown-menu {
    opacity: 1; visibility: visible;
    transform: translateX(-50%) translateY(0); pointer-events: all;
  }
  .dropdown-item {
    display: block; padding: 10px 18px; font-size: 14px; font-weight: 500;
    color: var(--text-primary); text-decoration: none;
    transition: all 0.2s cubic-bezier(0.28, 0.11, 0.32, 1);
    letter-spacing: -0.2px; border-radius: 12px; white-space: nowrap;
    text-align: center; cursor: pointer;
  }
  .dropdown-item:hover,
  .dropdown-item.active {
    background: rgba(0,113,227,0.1); color: var(--accent);
    transform: translateY(-2px);
  }

  /* ===== Navigation ===== */
  nav {
    position: fixed; top: 54px; left: 0; right: 0; height: var(--nav-height);
    background: rgba(0,0,0,0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    z-index: 1000; display: flex; align-items: center;
    justify-content: center; padding: 0 22px;
  }
  .nav-inner {
    display: flex; gap: 28px; max-width: 980px; width: 100%;
    justify-content: center; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-item {
    color: rgba(255,255,255,0.72); text-decoration: none;
    font-size: 13px; font-weight: 400; white-space: nowrap;
    transition: color 0.2s; letter-spacing: -0.12px; cursor: pointer;
  }
  .nav-item:hover, .nav-item.active { color: #ffffff; }

  /* ===== Main ===== */
  main { margin-top: 102px; }

  /* ===== Hero ===== */
  .hero {
    background: var(--bg-dark); color: var(--text-inverse);
    min-height: 88vh; display: flex; align-items: center;
    justify-content: center; padding: 60px 22px 80px;
    position: relative; overflow: hidden;
  }
  .hero-content {
    display: flex; align-items: center; justify-content: center;
    gap: 60px; max-width: 1080px; width: 100%; flex-wrap: wrap;
  }
  .hero-text { flex: 1; min-width: 280px; text-align: left; }
  .hero-badge {
    display: inline-block; font-size: 14px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: rgba(255,255,255,0.72); margin-bottom: 16px;
    opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.28, 0.11, 0.32, 1) 0.2s forwards;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero h1 {
    font-size: 52px; font-weight: 600; line-height: 1.07;
    letter-spacing: -0.28px; margin-bottom: 12px;
    opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.28, 0.11, 0.32, 1) 0.4s forwards;
  }
  .hero .subtitle {
    font-size: 21px; font-weight: 400; line-height: 1.19; letter-spacing: 0.231px;
    color: rgba(255,255,255,0.72); margin-bottom: 32px;
    opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.28, 0.11, 0.32, 1) 0.6s forwards;
  }
  .hero-ctas {
    display: flex; gap: 14px; flex-wrap: wrap;
    opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.28, 0.11, 0.32, 1) 0.8s forwards;
  }
  .btn-primary {
    display: inline-flex; align-items: center; background: var(--accent);
    color: #fff; padding: 11px 21px; border-radius: var(--radius-pill);
    font-size: 14px; font-weight: 400; text-decoration: none; border: none;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.28, 0.11, 0.32, 1);
  }
  .btn-primary:hover { background: var(--accent-hover); transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,113,227,0.4); }
  .btn-outline {
    display: inline-flex; align-items: center; background: transparent;
    color: var(--accent); padding: 11px 21px; border: 1.5px solid var(--accent);
    border-radius: var(--radius-pill); font-size: 14px; font-weight: 400;
    text-decoration: none; cursor: pointer;
    transition: all 0.3s cubic-bezier(0.28, 0.11, 0.32, 1);
  }
  .btn-outline:hover { background: var(--accent); color: #fff; transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,113,227,0.35); }
  .hero-image {
    flex: 0 0 460px; max-width: 460px; position: relative;
    opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.28, 0.11, 0.32, 1) 1s forwards;
  }
  .hero-image img {
    width: 100%; height: auto; display: block; border-radius: 18px;
    mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    transition: transform 0.6s cubic-bezier(0.28, 0.11, 0.32, 1);
  }
  .hero-image:hover img { transform: scale(1.02); }

  /* ===== Sections ===== */
  section { padding: 80px 22px; }
  .section-inner { max-width: 900px; margin: 0 auto; }
  .section-label {
    font-size: 13px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.8px;
  }
  .section-title { font-size: 32px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.28px; }
  .section-desc { font-size: 17px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.47; }

  /* Principle */
  .principle-grid { display: flex; gap: 48px; align-items: center; flex-wrap: wrap; }
  .principle-diagram { flex: 0 0 340px; max-width: 340px; display: flex; align-items: center; justify-content: center; }
  .principle-diagram img { width: 100%; max-width: 340px; height: auto; display: block; }
  .principle-text { flex: 1; min-width: 280px; }
  .principle-text h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
  .principle-text p { font-size: 15px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.58; }
  .principle-text strong { color: var(--text-primary); }

  /* ===== Steps — horizontal gradient cards ===== */
  .steps { 
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }
  .step-card {
    border-radius: 20px;
    padding: 28px 18px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.45s cubic-bezier(0.28, 0.11, 0.32, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .step-card:nth-child(1) { background: linear-gradient(160deg, #e8f0fe, #d2e3fc); }
  .step-card:nth-child(2) { background: linear-gradient(160deg, #d2e3fc, #a8ccf7); }
  .step-card:nth-child(3) { background: linear-gradient(160deg, #a8ccf7, #7bb4f5); }
  .step-card:nth-child(4) { background: linear-gradient(160deg, #7bb4f5, #4d9bf2); }
  .step-card:nth-child(5) { background: linear-gradient(160deg, #4d9bf2, #0071e3); }
  .step-card:nth-child(6) { background: linear-gradient(160deg, #0071e3, #005bb5); }
  
  .step-card:nth-child(4) .step-num,
  .step-card:nth-child(5) .step-num,
  .step-card:nth-child(6) .step-num { 
    background: rgba(255,255,255,0.95); color: var(--accent); 
  }
  .step-card:nth-child(4) h4,
  .step-card:nth-child(5) h4,
  .step-card:nth-child(6) h4 { color: #fff; }
  .step-card:nth-child(4) p,
  .step-card:nth-child(5) p,
  .step-card:nth-child(6) p { color: rgba(255,255,255,0.85); }
  
  .step-card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 18px 48px rgba(0,113,227,0.22);
  }
  .step-num {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.9);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .step-card h4 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin: 0; }
  .step-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.45; margin: 0; }
  .step-body { flex: 1; display: flex; flex-direction: column; gap: 4px; }

  /* ===== Features — colorful gradient card grid ===== */
  .features-grid { 
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .feature-card {
    border-radius: 22px;
    padding: 32px 24px 28px;
    transition: all 0.45s cubic-bezier(0.28, 0.11, 0.32, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  /* Distinct gradient colors per card */
  .feature-card:nth-child(1) { background: linear-gradient(155deg, #e3f2fd, #bbdefb); }
  .feature-card:nth-child(2) { background: linear-gradient(155deg, #e8f5e9, #c8e6c9); }
  .feature-card:nth-child(3) { background: linear-gradient(155deg, #fff3e0, #ffe0b2); }
  .feature-card:nth-child(4) { background: linear-gradient(155deg, #f3e5f5, #e1bee7); }
  .feature-card:nth-child(5) { background: linear-gradient(155deg, #e0f7fa, #b2ebf2); }
  .feature-card:nth-child(6) { background: linear-gradient(155deg, #fce4ec, #f8bbd0); }

  .feature-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 18px 52px rgba(0,0,0,0.14);
  }
  .feature-icon {
    width: 54px; height: 54px; border-radius: 16px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .feature-card h4 { 
    font-size: 17px; font-weight: 700; 
    color: var(--text-primary);
    margin: 0;
  }
  .feature-card p { 
    font-size: 14px; color: var(--text-secondary); 
    line-height: 1.55; margin: 0; 
  }

  /* Candidates */
  .candidate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .candidate-card {
    background: rgba(255,255,255,0.7); backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 0.5px solid rgba(0,0,0,0.06); border-radius: 18px;
    padding: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }
  .candidate-card h4 { font-size: 17px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-green { background: #34c759; }
  .dot-red { background: #ff3b30; }
  .candidate-card ul { list-style: none; }
  .candidate-card li { font-size: 14px; color: var(--text-secondary); padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .candidate-card li:last-child { border-bottom: none; }
  .candidate-card li::before { content: '— '; color: var(--text-tertiary); }

  /* Versions */
  .version-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .version-card {
    background: rgba(255,255,255,0.75); backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border: 0.5px solid rgba(0,0,0,0.06); border-radius: 22px;
    padding: 32px 28px; box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border-top: 4px solid var(--accent);
    transition: all 0.5s cubic-bezier(0.28, 0.11, 0.32, 1);
  }
  .version-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 56px rgba(0,0,0,0.16), inset 0 1px 0 rgba(255,255,255,0.9);
    background: rgba(255,255,255,0.88);
  }
  .tag {
    display: inline-block; font-size: 12px; font-weight: 500; color: var(--accent);
    background: rgba(0,113,227,0.08); padding: 3px 10px; border-radius: var(--radius-pill);
    margin-bottom: 12px;
  }
  .version-card h4 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .version-card p { font-size: 14px; color: var(--text-secondary); line-height: 1.55; }
  .version-card strong { color: var(--text-primary); }

  /* Pros & Cons */
  .procon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .procon-card {
    background: rgba(255,255,255,0.7); backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 0.5px solid rgba(0,0,0,0.06); border-radius: 18px;
    padding: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }
  .procon-card h4 { font-size: 17px; font-weight: 600; margin-bottom: 14px; }
  .procon-card ul { list-style: none; }
  .procon-card li { font-size: 14px; color: var(--text-secondary); padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); }
  .procon-card li:last-child { border-bottom: none; }

  /* Video */
  #video-section { background: var(--bg-light); }
  .video-placeholder {
    width: 100%; max-width: 720px; margin: 0 auto;
    background: rgba(0,0,0,0.88); border-radius: var(--radius-lg);
    aspect-ratio: 16/9; display: flex; align-items: center;
    justify-content: center; cursor: pointer; overflow: hidden;
    transition: all 0.3s cubic-bezier(0.28, 0.11, 0.32, 1);
  }
  .video-placeholder:hover { transform: scale(1.01); box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
  .video-placeholder .play-btn {
    width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px); display: flex; align-items: center;
    justify-content: center; transition: transform 0.3s;
  }
  .video-placeholder:hover .play-btn { transform: scale(1.08); }
  .video-placeholder iframe { width: 100%; height: 100%; border: none; }

  /* Footer */
  footer {
    background: var(--bg-light); padding: 32px 22px;
    text-align: center; border-top: 1px solid var(--border);
  }
  footer p { font-size: 12px; color: var(--text-tertiary); letter-spacing: -0.12px; }

  /* Scroll Animation */
  .fade-in {
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* Responsive */
  @media (max-width: 834px) {
    .hero h1 { font-size: 38px; }
    .hero .subtitle { font-size: 17px; }
    .section-title { font-size: 28px; }
    .hero-content { flex-direction: column; text-align: center; }
    .hero-ctas { justify-content: center; }
    .hero-image { flex: 0 0 320px; max-width: 320px; }
    .principle-grid { flex-direction: column; text-align: center; }
    .steps { grid-template-columns: repeat(3, 1fr) !important; }
    .features-grid { grid-template-columns: 1fr 1fr !important; }
    .candidate-grid, .procon-grid, .version-grid { grid-template-columns: 1fr; }
    .tab-btn { padding: 10px 14px; font-size: 14px; }
    .tab-bar-inner { overflow-x: auto; justify-content: flex-start; -webkit-overflow-scrolling: touch; }
    .dropdown-menu { min-width: 220px; flex-wrap: wrap; }
    .dropdown-item { font-size: 12px; padding: 8px 12px; }
  }
  @media (max-width: 480px) {
    .hero h1 { font-size: 28px; }
    .hero .subtitle { font-size: 15px; }
    .section-title { font-size: 24px; }
    .steps { grid-template-columns: 1fr 1fr !important; }
    .features-grid { grid-template-columns: 1fr !important; }
    .hero-image { flex: 0 0 240px; max-width: 240px; }
    .tab-btn { padding: 8px 10px; font-size: 13px; }
    .dropdown-menu { 
      min-width: auto; width: 85vw; left: 50%; 
      transform: translateX(-50%) translateY(8px);
      flex-direction: column; gap: 2px; padding: 10px 12px;
      z-index: 3000;
    }
    .tab-item.has-dropdown:hover .dropdown-menu { transform: translateX(-50%) translateY(0); }
    .dropdown-item { font-size: 13px; padding: 10px 14px; text-align: left; }
    nav { top: 36px; }
    main { margin-top: 84px; }
    .nav-inner { gap: 14px; }
    .nav-item { font-size: 11px; }
    section { padding: 48px 14px; }
  }
</style>
</head>
<body>

<!-- ===== Tab Bar ===== -->
<div class="tab-bar">
  <div class="tab-bar-inner">
    <div class="tab-item">
      <button class="tab-btn active" data-procedure="smile">SMILE 全飞秒</button>
    </div>
    <div class="tab-item has-dropdown">
      <button class="tab-btn" data-procedure="fslasik">FS-LASIK 半飞秒</button>
      <div class="dropdown-menu" data-parent="fslasik">
        <span class="dropdown-item active" data-procedure="fslasik-ray">光迹追踪引导（全光塑）</span>
        <span class="dropdown-item" data-procedure="fslasik-c">地形图引导（精雕C+）</span>
        <span class="dropdown-item" data-procedure="fslasik-q">Q值引导（精雕Q+）</span>
        <span class="dropdown-item" data-procedure="fslasik-wavefront">波前像差引导（精雕）</span>
      </div>
    </div>
    <div class="tab-item">
      <button class="tab-btn" data-procedure="tprk">全激光TPRK</button>
    </div>
    <div class="tab-item has-dropdown">
      <button class="tab-btn" data-procedure="icl">晶体植入</button>
      <div class="dropdown-menu" data-parent="icl">
        <span class="dropdown-item active" data-procedure="icl-v5">ICL-V5</span>
        <span class="dropdown-item" data-procedure="icl-longjing">龙晶</span>
      </div>
    </div>
  </div>
</div>

<!-- ===== Navigation ===== -->
<nav>
  <div class="nav-inner">
    <a class="nav-item active" onclick="scrollToSection('hero')">概览</a>
    <a class="nav-item" onclick="scrollToSection('principle')">手术原理</a>
    <a class="nav-item" onclick="scrollToSection('process')">手术过程</a>
    <a class="nav-item" onclick="scrollToSection('features')">特点亮点</a>
    <a class="nav-item" onclick="scrollToSection('candidates')">适合人群</a>

// ===== Tab Switching =====
function switchProcedure(procId) {
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.procedure === procId || 
      (['fslasik-wavefront','fslasik-q','fslasik-c','fslasik-ray'].includes(procId) && btn.dataset.procedure === 'fslasik') ||
      (['icl-v5','icl-longjing'].includes(procId) && btn.dataset.procedure === 'icl'));
  });
  
  // Update dropdown items
  document.querySelectorAll('.dropdown-item').forEach(item => {
    item.classList.toggle('active', item.dataset.procedure === procId);
  });

  // Render content
  renderProcedure(procId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== Event Listeners =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const parent = this.closest('.tab-item');
    const dropdown = parent.querySelector('.dropdown-menu');
    
    if (dropdown) {
      // If has dropdown, select the first active dropdown item
      const firstItem = dropdown.querySelector('.dropdown-item.active') || dropdown.querySelector('.dropdown-item');
      switchProcedure(firstItem.dataset.procedure);
    } else {
      switchProcedure(this.dataset.procedure);
    }
  });
});

document.querySelectorAll('.dropdown-item').forEach(item => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    switchProcedure(this.dataset.procedure);
  });
});

// ===== Scroll Observer + Nav Highlight =====
function initScrollObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  // Nav scroll spy (init once)
  if (!window._scrollSpyActive) {
    window._scrollSpyActive = true;
    const sections = ['hero','principle','process','features','candidates','pros-cons','video-section'];
    const navItems = document.querySelectorAll('.nav-item');
  const mainEl = document.querySelector('main');
  
  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY + 130;
    let current = 'hero';
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.offsetTop <= scrollY) current = id;
    });
    navItems.forEach(item => {
      const target = item.getAttribute('onclick')?.match(/'(.*?)'/)?.[1];
      item.classList.toggle('active', target === current);
    });
  });
  }
}

// ===== Smooth Scroll =====
window.scrollToSection = function(id) {
  const el = document.getElementById(id);
  if (el) {
    const offset = 112; // tab bar + nav height
    window.scrollTo({ top: el.offsetTop - offset, behavior: 'smooth' });
  }
};
